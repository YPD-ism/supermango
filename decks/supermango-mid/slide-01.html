<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root {
    --bg: #0A0A0A;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-secondary: #A1A1AA;
    --text-muted: #71717A;
    --gold: #FACC15;
    --gold-glow: rgba(250,204,21,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* subtle radial glow */
  .glow {
    position: absolute;
    width: 400pt; height: 400pt;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 60%);
    pointer-events: none;
  }
  .content {
    position: relative; z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20pt;
  }
  .emoji-logo {
    font-size: 52pt;
    filter: drop-shadow(0 0 24pt rgba(250,204,21,0.25));
  }
  h1 {
    font-size: 60pt;
    font-weight: 900;
    letter-spacing: -2.5pt;
    color: var(--gold);
    line-height: 1.05;
  }
  .subtitle {
    font-size: 16pt;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.5pt;
  }
  .divider {
    width: 48pt; height: 2pt;
    background: var(--gold);
    opacity: 0.3;
    border-radius: 1pt;
  }
  .team-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12pt;
  }
  .team-name {
    font-size: 14pt;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 2pt;
  }
  .members {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12pt;
    color: var(--text-muted);
    display: flex;
    gap: 28pt;
  }
  .members span {
    display: flex;
    align-items: center;
    gap: 8pt;
  }
  .members span::before {
    content: '+';
    color: var(--gold);
    font-weight: 700;
    opacity: 0.6;
  }
  .github {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11pt;
    color: var(--text-muted);
    padding: 6pt 16pt;
    border: 1px solid var(--border);
    border-radius: 20pt;
    background: var(--surface);
  }
  .slide-num {
    position: absolute;
    top: 20pt; right: 28pt;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10pt;
    color: var(--text-muted);
    letter-spacing: 1pt;
  }
  .badge {
    position: absolute;
    bottom: 20pt; left: 28pt;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10pt;
    color: var(--text-muted);
    letter-spacing: 2pt;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="slide-num">01 / 05</div>
  <div class="content">
    <div class="emoji-logo">🥭</div>
    <h1>Supermango</h1>
    <div class="subtitle">Slack 링크 자동 요약 & 카드뉴스</div>
    <div class="divider"></div>
    <div class="team-info">
      <div class="team-name">Team Supermango</div>
      <div class="members">
        <span>이용현 @YPD-ism</span>
        <span>한대환 @dhan-iscream</span>
      </div>
      <div class="github">github.com/ProudBiz/supermango</div>
    </div>
  </div>
  <div class="badge">Ralphthon Seoul 2026</div>
</body>
</html>
