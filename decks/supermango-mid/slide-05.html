<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root {
    --bg: #06091a;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.06);
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #475569;
    --gold: #facc15;
    --gold-dim: rgba(250,204,21,0.08);
    --green: #22c55e;
    --green-glow: rgba(34,197,94,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 28pt 36pt;
    display: flex;
    flex-direction: column;
    gap: 12pt;
    overflow: hidden;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; z-index: 0;
    opacity: 0.35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    pointer-events: none;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 36pt 36pt;
    pointer-events: none;
    mask-image: linear-gradient(to bottom, black 20%, transparent 85%);
    -webkit-mask-image: linear-gradient(to bottom, black 20%, transparent 85%);
  }
  /* celebratory glow */
  .glow-accent {
    position: absolute;
    top: -40pt; left: -40pt;
    width: 200pt; height: 200pt;
    background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .slide-num {
    position: absolute;
    top: 20pt; right: 28pt;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9pt;
    color: var(--text-muted);
    letter-spacing: 1pt;
    z-index: 3;
  }
  .header-row {
    position: relative; z-index: 2;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .header-row h2 {
    font-size: 32pt;
    font-weight: 900;
    background: linear-gradient(135deg, #fde68a, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20pt rgba(250,204,21,0.12));
  }
  .header-row .stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14pt;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.5pt;
  }
  /* progress bar */
  .progress-bar-container {
    position: relative; z-index: 2;
    width: 100%; height: 6pt;
    background: rgba(255,255,255,0.04);
    border-radius: 3pt;
    overflow: hidden;
  }
  .progress-bar {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--gold) 100%);
    border-radius: 3pt;
    box-shadow: 0 0 12pt rgba(34,197,94,0.3);
  }
  /* stories grid */
  .stories-grid {
    position: relative; z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7pt;
    flex: 1;
  }
  .story-item {
    display: flex;
    align-items: center;
    gap: 8pt;
    padding: 8pt 12pt;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8pt;
    transition: border-color 0.3s;
  }
  .story-item:hover {
    border-color: rgba(34,197,94,0.15);
  }
  .story-item .check {
    font-size: 11pt;
    flex-shrink: 0;
    filter: saturate(0.8);
  }
  .story-item .story-title {
    font-size: 10pt;
    color: var(--text);
    flex: 1;
    font-weight: 500;
  }
  .story-item .tasks-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8pt;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    padding: 2pt 6pt;
    border-radius: 10pt;
  }
  /* bottom */
  .bottom-section {
    position: relative; z-index: 2;
    text-align: center;
    padding-top: 10pt;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6pt;
  }
  .bottom-message {
    font-size: 20pt;
    font-weight: 900;
    background: linear-gradient(135deg, #fde68a, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 16pt rgba(250,204,21,0.15));
  }
  .bottom-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9pt;
    color: var(--text-muted);
    letter-spacing: 0.5pt;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="glow-accent"></div>
  <div class="bg-grid"></div>
  <div class="slide-num">05 / 05</div>
  <div class="header-row">
    <h2>현재 진행 상황</h2>
    <div class="stat">9/9 Stories · 18/18 Tasks</div>
  </div>
  <div class="progress-bar-container">
    <div class="progress-bar"></div>
  </div>
  <div class="stories-grid">
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">프로젝트 초기 설정</div>
      <div class="tasks-count">3</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">Slack 링크 자동 요약</div>
      <div class="tasks-count">4</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">카드뉴스 이미지 생성</div>
      <div class="tasks-count">2</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 Slack OAuth 로그인</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 통합 피드</div>
      <div class="tasks-count">3</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 필터링</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 메시지 공유</div>
      <div class="tasks-count">2</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 랜딩페이지</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">Slack Bot e2e 테스트</div>
      <div class="tasks-count">1</div>
    </div>
  </div>
  <div class="bottom-section">
    <div class="bottom-message">전체 기능 구현 완료</div>
    <div class="bottom-sub">Planner → Coder → Reviewer → QA — Ralph 루프로 자율 구현</div>
  </div>
</body>
</html>
