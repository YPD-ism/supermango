<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root {
    --bg: #0A0A0A;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-secondary: #A1A1AA;
    --text-muted: #71717A;
    --gold: #FACC15;
    --gold-glow: rgba(250,204,21,0.12);
    --green: #22C55E;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32pt 40pt;
    display: flex;
    flex-direction: column;
    gap: 14pt;
    overflow: hidden;
    position: relative;
  }
  .slide-num {
    position: absolute;
    top: 20pt; right: 28pt;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10pt;
    color: var(--text-muted);
    letter-spacing: 1pt;
    z-index: 3;
  }
  .header-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .header-row h2 {
    font-size: 36pt;
    font-weight: 900;
    color: var(--gold);
  }
  .header-row .stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16pt;
    font-weight: 700;
    color: var(--green);
  }
  /* progress bar */
  .progress-bar-container {
    width: 100%; height: 6pt;
    background: rgba(255,255,255,0.04);
    border-radius: 3pt;
    overflow: hidden;
  }
  .progress-bar {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 3pt;
  }
  /* stories grid */
  .stories-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8pt;
    flex: 1;
  }
  .story-item {
    display: flex;
    align-items: center;
    gap: 10pt;
    padding: 10pt 14pt;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8pt;
  }
  .story-item .check {
    font-size: 12pt;
    flex-shrink: 0;
  }
  .story-item .story-title {
    font-size: 12pt;
    color: var(--text);
    flex: 1;
    font-weight: 500;
  }
  .story-item .tasks-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10pt;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    padding: 3pt 8pt;
    border-radius: 10pt;
  }
  /* bottom */
  .bottom-section {
    text-align: center;
    padding-top: 12pt;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8pt;
  }
  .bottom-message {
    font-size: 22pt;
    font-weight: 900;
    color: var(--gold);
  }
  .bottom-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11pt;
    color: var(--text-muted);
  }
</style>
</head>
<body>
  <div class="slide-num">05 / 05</div>
  <div class="header-row">
    <h2>현재 진행 상황</h2>
    <div class="stat">9/9 Stories · 18/18 Tasks</div>
  </div>
  <div class="progress-bar-container">
    <div class="progress-bar"></div>
  </div>
  <div class="stories-grid">
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">프로젝트 초기 설정</div>
      <div class="tasks-count">3</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">Slack 링크 자동 요약</div>
      <div class="tasks-count">4</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">카드뉴스 이미지 생성</div>
      <div class="tasks-count">2</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 Slack OAuth 로그인</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 통합 피드</div>
      <div class="tasks-count">3</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 필터링</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 메시지 공유</div>
      <div class="tasks-count">2</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 랜딩페이지</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">Slack Bot e2e 테스트</div>
      <div class="tasks-count">1</div>
    </div>
  </div>
  <div class="bottom-section">
    <div class="bottom-message">전체 기능 구현 완료</div>
    <div class="bottom-sub">Planner → Coder → Reviewer → QA — Ralph 루프로 자율 구현</div>
  </div>
</body>
</html>
