<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #0a0e27;
    color: #e8eaf6;
    padding: 28pt 40pt;
    display: flex;
    flex-direction: column;
    gap: 14pt;
    overflow: hidden;
    position: relative;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 30pt 30pt;
    pointer-events: none;
  }
  .header-row {
    position: relative; z-index: 1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .header-row h2 {
    font-size: 30pt;
    font-weight: 900;
    background: linear-gradient(135deg, #ffd600, #ffab00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-row .stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16pt;
    font-weight: 900;
    color: #00e676;
  }
  .progress-bar-container {
    position: relative; z-index: 1;
    width: 100%;
    height: 10pt;
    background: rgba(255,255,255,0.06);
    border-radius: 5pt;
    overflow: hidden;
  }
  .progress-bar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #00e676 0%, #ffd600 100%);
    border-radius: 5pt;
  }
  .stories-grid {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8pt;
    flex: 1;
  }
  .story-item {
    display: flex;
    align-items: center;
    gap: 8pt;
    padding: 8pt 12pt;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6pt;
  }
  .story-item .check {
    font-size: 12pt;
    flex-shrink: 0;
  }
  .story-item .story-title {
    font-size: 10pt;
    color: #e8eaf6;
    flex: 1;
  }
  .story-item .tasks-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8pt;
    color: #546e7a;
    flex-shrink: 0;
  }
  .bottom-message {
    position: relative; z-index: 1;
    text-align: center;
    font-size: 18pt;
    font-weight: 900;
    color: #ffd600;
  }
  .bottom-sub {
    position: relative; z-index: 1;
    text-align: center;
    font-size: 10pt;
    color: #78909c;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="header-row">
    <h2>현재 진행 상황</h2>
    <div class="stat">9/9 Stories · 18/18 Tasks</div>
  </div>
  <div class="progress-bar-container">
    <div class="progress-bar"></div>
  </div>
  <div class="stories-grid">
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">프로젝트 초기 설정</div>
      <div class="tasks-count">3</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">Slack 링크 자동 요약</div>
      <div class="tasks-count">4</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">카드뉴스 이미지 생성</div>
      <div class="tasks-count">2</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 Slack OAuth 로그인</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 통합 피드</div>
      <div class="tasks-count">3</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 필터링</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 메시지 공유</div>
      <div class="tasks-count">2</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">웹앱 랜딩페이지</div>
      <div class="tasks-count">1</div>
    </div>
    <div class="story-item">
      <div class="check">✅</div>
      <div class="story-title">Slack Bot e2e 테스트</div>
      <div class="tasks-count">1</div>
    </div>
  </div>
  <div class="bottom-message">전체 기능 구현 완료</div>
  <div class="bottom-sub">Planner → Coder → Reviewer → QA — Ralph 루프로 자율 구현</div>
</body>
</html>
