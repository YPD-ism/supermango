<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root {
    --bg: #0A0A0A;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-secondary: #A1A1AA;
    --text-muted: #71717A;
    --gold: #FACC15;
    --gold-glow: rgba(250,204,21,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 36pt 44pt;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .slide-num {
    position: absolute;
    top: 20pt; right: 28pt;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10pt;
    color: var(--text-muted);
    letter-spacing: 1pt;
    z-index: 3;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16pt;
    margin-bottom: 28pt;
  }
  .header h2 {
    font-size: 36pt;
    font-weight: 900;
    color: var(--gold);
  }
  .persona {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11pt;
    font-weight: 600;
    color: var(--text-muted);
    padding: 6pt 16pt;
    border: 1px solid var(--border);
    border-radius: 20pt;
    background: var(--surface);
  }
  .pain-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18pt;
    flex: 1;
  }
  .pain-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12pt;
    padding: 24pt 22pt;
    display: flex;
    flex-direction: column;
    gap: 12pt;
  }
  .pain-card .number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 44pt;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .pain-card .desc {
    font-size: 16pt;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }
  .pain-card .label {
    font-size: 12pt;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .bottom-quote {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12pt;
    padding-top: 20pt;
    margin-top: 18pt;
    border-top: 1px solid var(--border);
  }
  .bottom-quote .quote-mark {
    font-size: 22pt;
    color: var(--gold);
    opacity: 0.4;
    font-weight: 900;
  }
  .bottom-quote .quote-text {
    font-size: 14pt;
    color: var(--text-secondary);
    font-weight: 700;
    font-style: italic;
  }
  .bottom-quote .quote-attr {
    font-size: 11pt;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="slide-num">02 / 05</div>
  <div class="header">
    <h2>문제</h2>
    <div class="persona">Slack 헤비 유저 · 멀티 프로젝트 · 의사결정자</div>
  </div>
  <div class="pain-grid">
    <div class="pain-card">
      <div class="number">15+</div>
      <div class="desc">하루에 쌓이는 링크</div>
      <div class="label">채널마다 쏟아지는 공유 링크, 읽어야 할 건 계속 늘어난다</div>
    </div>
    <div class="pain-card">
      <div class="number">45분</div>
      <div class="desc">매일 낭비되는 시간</div>
      <div class="label">건당 3분 이상 소요, 그마저도 집중해서 읽지 못한다</div>
    </div>
    <div class="pain-card">
      <div class="number">n회</div>
      <div class="desc">컨텍스트 스위칭</div>
      <div class="label">다른 관심사의 링크가 뒤섞여 집중력과 시간이 함께 증발</div>
    </div>
  </div>
  <div class="bottom-quote">
    <div class="quote-mark">"</div>
    <div class="quote-text">읽긴 읽는데, 집중해서 읽지 못합니다</div>
    <div class="quote-attr">— 실제 동료의 고통 호소</div>
  </div>
</body>
</html>
