<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root {
    --bg: #06091a;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.06);
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #475569;
    --red: #f43f5e;
    --red-dim: rgba(244,63,94,0.08);
    --red-glow: rgba(244,63,94,0.15);
    --gold: #facc15;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32pt 40pt;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; z-index: 0;
    opacity: 0.35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    pointer-events: none;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 36pt 36pt;
    pointer-events: none;
    mask-image: linear-gradient(to bottom, black 20%, transparent 90%);
    -webkit-mask-image: linear-gradient(to bottom, black 20%, transparent 90%);
  }
  /* red accent glow top-left */
  .glow-accent {
    position: absolute;
    top: -40pt; left: -40pt;
    width: 200pt; height: 200pt;
    background: radial-gradient(circle, var(--red-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .slide-num {
    position: absolute;
    top: 20pt; right: 28pt;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9pt;
    color: var(--text-muted);
    letter-spacing: 1pt;
    z-index: 3;
  }
  .header {
    position: relative; z-index: 2;
    display: flex;
    align-items: center;
    gap: 14pt;
    margin-bottom: 22pt;
  }
  .header h2 {
    font-size: 34pt;
    font-weight: 900;
    background: linear-gradient(135deg, #fb7185, #f43f5e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20pt var(--red-glow));
  }
  .persona {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9pt;
    font-weight: 600;
    color: var(--text-dim);
    padding: 5pt 14pt;
    border: 1px solid var(--border);
    border-radius: 20pt;
    background: var(--surface);
    letter-spacing: 0.5pt;
  }
  .pain-grid {
    position: relative; z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14pt;
    flex: 1;
  }
  .pain-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12pt;
    padding: 22pt 20pt;
    display: flex;
    flex-direction: column;
    gap: 10pt;
    transition: border-color 0.3s;
  }
  .pain-card:hover {
    border-color: rgba(244,63,94,0.2);
  }
  .pain-card .number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 38pt;
    font-weight: 700;
    background: linear-gradient(160deg, #fde68a, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .pain-card .desc {
    font-size: 15pt;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }
  .pain-card .label {
    font-size: 10pt;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .bottom-quote {
    position: relative; z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10pt;
    padding-top: 18pt;
    margin-top: 14pt;
    border-top: 1px solid var(--border);
  }
  .bottom-quote .quote-mark {
    font-size: 20pt;
    color: var(--red);
    opacity: 0.4;
    font-weight: 900;
  }
  .bottom-quote .quote-text {
    font-size: 13pt;
    color: #fca5a5;
    font-weight: 700;
    font-style: italic;
  }
  .bottom-quote .quote-attr {
    font-size: 9pt;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="glow-accent"></div>
  <div class="bg-grid"></div>
  <div class="slide-num">02 / 05</div>
  <div class="header">
    <h2>문제</h2>
    <div class="persona">Slack 헤비 유저 · 멀티 프로젝트 · 의사결정자</div>
  </div>
  <div class="pain-grid">
    <div class="pain-card">
      <div class="number">15+</div>
      <div class="desc">하루에 쌓이는 링크</div>
      <div class="label">채널마다 쏟아지는 공유 링크, 읽어야 할 건 계속 늘어난다</div>
    </div>
    <div class="pain-card">
      <div class="number">45분</div>
      <div class="desc">매일 낭비되는 시간</div>
      <div class="label">건당 3분 이상 소요, 그마저도 집중해서 읽지 못한다</div>
    </div>
    <div class="pain-card">
      <div class="number">n회</div>
      <div class="desc">컨텍스트 스위칭</div>
      <div class="label">다른 관심사의 링크가 뒤섞여 집중력과 시간이 함께 증발</div>
    </div>
  </div>
  <div class="bottom-quote">
    <div class="quote-mark">"</div>
    <div class="quote-text">읽긴 읽는데, 집중해서 읽지 못합니다</div>
    <div class="quote-attr">— 실제 동료의 고통 호소</div>
  </div>
</body>
</html>
